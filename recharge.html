<!DOCTYPE html>
<html>
<head>
<title>Recharge Plan</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="text-align:center;font-family:Arial">

<h2>Select Plan</h2>

<button onclick="pay(2000,30)">1 Month - ₹2000</button><br><br>
<button onclick="pay(6000,90)">3 Month - ₹6000</button><br><br>
<button onclick="pay(12000,180)">6 Month - ₹12000</button><br><br>
<button onclick="pay(24000,365)">1 Year - ₹24000</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxEnbnZSqh8sZlqF2GvMRuCf07IRcxKnwrfehjeBsRvJeNfdilEcJizIIggffo0jS074Q/exec";
const phone = localStorage.getItem("userPhone");

if(!phone){
  window.location.href="index.html";
}

function pay(amount, days){

  // 🔹 Create Order from server
  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      type:"createOrder",
      amount: amount,
      phone: phone,
      days: days
    })
  })
  .then(res=>res.json())
  .then(order=>{

    var options = {
      key: "rzp_test_SMkbaYdtUC8Vnp",
      amount: order.amount,
      currency: "INR",
      order_id: order.id,
      name: "Gold Poster Subscription",
      description: days + " Days Plan",

      handler: function (response){
        alert("Payment Successful. Activating plan...");
        window.location.href="home.html";
      }
    };

    var rzp = new Razorpay(options);
    rzp.open();

  });

}

</script>

</body>
</html>
