<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewellery Login</title>

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#b8860b,#ffd700);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:10px;
}

/* TITLE */

.title{
  text-align:center;
  color:white;
  margin-bottom:20px;
}

.title h1{
  margin:0;
  font-size:28px;
}

.title p{
  margin:5px 0 0 0;
  font-size:14px;
}

/* LOGIN BOX */

.login-box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:100%;
  max-width:330px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
  margin-top:0;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

.login-btn{
  background:#b8860b;
  color:white;
}

.login-btn:hover{
  background:#a07600;
}

.register-btn{
  background:#444;
  color:white;
}

.register-btn:hover{
  background:#222;
}

.error{
  color:red;
  margin-top:10px;
}
.forgot-btn{
  background:#25D366;
  color:white;
}

.forgot-btn:hover{
  background:#1da851;
}
</style>
</head>

<body>

<div class="title">
<h1>💎 Daily Gold Poster</h1>
<p>Download System</p>
</div>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="phone" placeholder="Phone Number">
  <input type="password" id="code" placeholder="Security Code">

  <button class="login-btn" onclick="login()">Login</button>
  <button class="register-btn" onclick="goRegister()">Register</button>
  <button class="forgot-btn" onclick="openWhatsApp()">
Forgot Security Code?
</button>

  <div class="error" id="error"></div>
</div>

<script>

// 🔥 USE ONLY ONE WEB APP URL
const API_URL = "https://script.google.com/macros/s/AKfycbzFaORThCq4DlWhbVIqg3yTCq4GJrzk01xxYftLu9CyGU4CoYkv3OGGop6sAVPi2U8X3g/exec";



function login() {
  const phone = document.getElementById("phone").value.trim();
  const code = document.getElementById("code").value.trim();

  if (!phone || !code) {
    document.getElementById("error").innerText = "Please fill all fields";
    return;
  }

  // ലോഗിൻ ബട്ടൺ താൽക്കാലികമായി ഡിസേബിൾ ചെയ്യുക
  document.getElementById("error").innerText = "Logging in...";

  
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
  type: "login",
  phone: phone,
  code: code
})
  })
  .then(response => response.json()) // text() ന് പകരം json() ഉപയോഗിക്കുക
  .then(data => {
    if (data.status === "success") {
      localStorage.setItem("userPhone", phone);
      window.location.href = "index.html";
    } else {
      document.getElementById("error").innerText = "Invalid phone or security code";
    }
  })
  .catch(err => {
    document.getElementById("error").innerText = "Server error or CORS issue";
    console.error("Error:", err);
  });
}
function goRegister(){
  // Optional: create separate register.html in GitHub
  window.location.href = "register.html";
}
function openWhatsApp(){

const msg = encodeURIComponent("I am forget my security code!");

window.open(
"https://wa.me/919645565177?text=" + msg,
"_blank"
);

}
</script>

</body>
</html>
