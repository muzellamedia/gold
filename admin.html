<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#000000,#b8860b);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:380px;
  padding:22px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h3{
  margin-top:0;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  background:#b8860b;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  font-size:16px;
}

button:hover{
  background:#a07600;
}

.error{
  color:red;
  font-size:14px;
}

#adminPanel{
  display:none;
}

/* Mobile optimisation */

@media (max-width:480px){

.card{
  padding:18px;
}

button{
  padding:13px;
}

}

</style>
</head>

<body>

<div class="card">
  

<!-- Password Only Section -->
<div id="loginSection">
  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Enter Password">
  <button onclick="checkPassword()">Login</button>
  <div class="error" id="error"></div>
</div>

<!-- Admin Options -->
<div id="adminPanel">

  <h3>Update Gold Rate</h3>

  <input type="number" id="gramRate" placeholder="Enter 1 Gram Rate">

  <div id="preview" style="font-weight:bold;"></div>

  <button onclick="updateRate()">Update Today Rate</button>
  <hr style="margin:20px 0">

  <hr style="margin:20px 0">

<h3>Edit User Details</h3>

<input type="text" id="editPhone" placeholder="Enter User Phone">

<button onclick="loadUser()">Load User</button>

<div id="userEditBox" style="display:none">

<input type="text" id="editShop" placeholder="Shop Name">
<input type="text" id="editPlace" placeholder="Place">
<input type="text" id="editDistrict" placeholder="District">
<input type="email" id="editEmail" placeholder="Email">

<input type="text" id="editContact1" placeholder="Contact 1">
<input type="text" id="editContact2" placeholder="Contact 2">
<input type="text" id="editContact3" placeholder="Contact 3">
  

  <input type="text" id="lastLogin" placeholder="Last Login Time" readonly>

<input type="text" id="planExpiry" placeholder="Plan Expiry" readonly>

<input type="datetime-local" id="lastEdit">

<button onclick="saveUser()">Save Changes</button>


<h3>Manual Recharge</h3>

<input type="text" id="userPhone" placeholder="Enter User Phone">

<select id="planDays">
<option value="">Select Plan</option>
<option value="30">30 Days</option>
<option value="90">90 Days</option>
<option value="180">180 Days</option>
<option value="365">365 Days</option>
</select>

<button onclick="activatePlan()">Activate Plan</button>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxseHP6OEck_UjQiTn1CragD3cmhpyW-7I4u6aN_BbnKV90lDvj4rD8trWRqgzdxIVDxw/exec";
const ADMIN_PASSWORD = "admin@1994";

// Check Password
function checkPassword(){

  const entered = document.getElementById("adminPass").value;

  if(entered === ADMIN_PASSWORD){
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  }else{
    document.getElementById("error").innerText = "Wrong Password";
  }
}

// Auto Calculate Pavan
document.getElementById("gramRate").addEventListener("input", function(){

  const gram = parseFloat(this.value) || 0;
  const pavan = gram * 8;

  document.getElementById("preview").innerHTML =
    "1 Pavan = ₹ " + pavan.toFixed(2);
});
// =====================
// MANUAL RECHARGE
// =====================

function activatePlan(){

const phone = document.getElementById("userPhone").value.trim();
const days = document.getElementById("planDays").value;

if(!phone || !days){
alert("Enter phone and select plan");
return;
}

fetch(API_URL,{
method:"POST",
body: JSON.stringify({
type:"activatePlan",
phone: phone,
days: parseInt(days)
})
})
.then(res=>res.json())
.then(data=>{

if(data.status === "success"){
alert("Plan Activated Successfully");
}else{
alert("Activation Failed");
}

});

}

  function loadUser(){

const phone = document.getElementById("editPhone").value.trim();

if(!phone){
alert("Enter phone number");
return;
}

fetch(API_URL + "?type=user&phone=" + phone)
.then(res=>res.json())
.then(data=>{

if(data.error){
alert("User not found");
return;
}

document.getElementById("userEditBox").style.display="block";
  document.getElementById("lastLogin").value = data.lastLoginTime || "";
document.getElementById("planExpiry").value = data.planExpiry || "";
document.getElementById("lastEdit").value = data.lastEditTime || "";

editShop.value = data.shop || "";
editPlace.value = data.place || "";
editDistrict.value = data.district || "";
editEmail.value = data.email || "";

editContact1.value = data.contact1 || "";
editContact2.value = data.contact2 || "";
editContact3.value = data.contact3 || "";

});

}

  function saveUser(){

const phone = document.getElementById("editPhone").value.trim();

fetch(API_URL,{
method:"POST",
body: JSON.stringify({

type:"updateUserAdmin",
phone: phone,

shop: editShop.value,
place: editPlace.value,
district: editDistrict.value,
email: editEmail.value,

contact1: editContact1.value,
contact2: editContact2.value,
contact3: editContact3.value

})
})
.then(res=>res.json())
.then(data=>{

if(data.status==="success"){
alert("User updated successfully");
}else{
alert("Update failed");
}

});

}
// Update Rate
function updateRate(){

  const gram = parseFloat(document.getElementById("gramRate").value);

  if(!gram){
    alert("Enter valid rate");
    return;
  }

  const pavan = gram * 8;
  const today = new Date().toISOString().slice(0,10);

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      type:"updateRate",
      gold1gram: gram,
      gold1pavan: pavan,
      date: today
    })
  })
  .then(res=>res.json())
  .then(()=>{
    alert("Today's Rate Updated Successfully");
  });

}
</script>

</body>
</html>
