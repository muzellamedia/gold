<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#000000,#b8860b);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:380px;
  padding:22px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h3{
  margin-top:0;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  background:#b8860b;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  font-size:16px;
}

button:hover{
  background:#a07600;
}

.error{
  color:red;
  font-size:14px;
}

#adminPanel{
  display:none;
}

/* Mobile optimisation */

@media (max-width:480px){

.card{
  padding:18px;
}

button{
  padding:13px;
}

}

</style>
</head>

<body>

<div class="card">

<!-- Password Only Section -->
<div id="loginSection">
  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Enter Password">
  <button onclick="checkPassword()">Login</button>
  <div class="error" id="error"></div>
</div>

<!-- Admin Options -->
<div id="adminPanel">

  <h3>Update Gold Rate</h3>

  <input type="number" id="gramRate" placeholder="Enter 1 Gram Rate">

  <div id="preview" style="font-weight:bold;"></div>

  <button onclick="updateRate()">Update Today Rate</button>
  <hr style="margin:20px 0">

<h3>Manual Recharge</h3>

<input type="text" id="userPhone" placeholder="Enter User Phone">

<select id="planDays">
<option value="">Select Plan</option>
<option value="30">30 Days</option>
<option value="90">90 Days</option>
<option value="180">180 Days</option>
<option value="365">365 Days</option>
</select>

<button onclick="activatePlan()">Activate Plan</button>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwa2BJ9eStgHeOJ5sZ3QT1ITyp3y8wyEY4hdgF_yplAv4rzWl5_yFKACz8nHo5bs4SjwA/exec";
const ADMIN_PASSWORD = "admin@1994";

// Check Password
function checkPassword(){

  const entered = document.getElementById("adminPass").value;

  if(entered === ADMIN_PASSWORD){
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  }else{
    document.getElementById("error").innerText = "Wrong Password";
  }
}

// Auto Calculate Pavan
document.getElementById("gramRate").addEventListener("input", function(){

  const gram = parseFloat(this.value) || 0;
  const pavan = gram * 8;

  document.getElementById("preview").innerHTML =
    "1 Pavan = ₹ " + pavan.toFixed(2);
});
// =====================
// MANUAL RECHARGE
// =====================

function activatePlan(){

const phone = document.getElementById("userPhone").value.trim();
const days = document.getElementById("planDays").value;

if(!phone || !days){
alert("Enter phone and select plan");
return;
}

fetch(API_URL,{
method:"POST",
body: JSON.stringify({
type:"activatePlan",
phone: phone,
days: parseInt(days)
})
})
.then(res=>res.json())
.then(data=>{

if(data.status === "success"){
alert("Plan Activated Successfully");
}else{
alert("Activation Failed");
}

});

}
// Update Rate
function updateRate(){

  const gram = parseFloat(document.getElementById("gramRate").value);

  if(!gram){
    alert("Enter valid rate");
    return;
  }

  const pavan = gram * 8;
  const today = new Date().toISOString().slice(0,10);

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      type:"updateRate",
      gold1gram: gram,
      gold1pavan: pavan,
      date: today
    })
  })
  .then(res=>res.json())
  .then(()=>{
    alert("Today's Rate Updated Successfully");
  });

}
</script>

</body>
</html>
