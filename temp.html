<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#eee;
margin:0;
padding:20px;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.box{
flex:1;
min-width:350px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:420px;
font-family:monospace;
font-size:14px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#b8860b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.previewBox{
background:#1f8f3a;
padding:15px;
border-radius:10px;
text-align:center;
}

canvas{
background:#1f8f3a;
max-width:100%;
}

</style>
</head>

<body>

<h2>Canvas Template Function Preview</h2>

<div class="container">

<div class="box">

<h3>Paste Template Function</h3>

<textarea id="codeBox">

function template1(ctx, canvas){

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="bold 160px Arial";
ctx.fillText("SHOP NAME",1240,250);

ctx.font="bold 180px Arial";
ctx.fillText("₹ 9450",1240,1700);

ctx.font="bold 150px Arial";
ctx.fillText("1 GRAM",1240,1900);

ctx.font="bold 180px Arial";
ctx.fillText("₹ 75600",1240,2300);

ctx.font="bold 150px Arial";
ctx.fillText("1 PAVAN",1240,2500);

ctx.font="bold 80px Arial";
ctx.fillText("Contact: 9645565177",1240,3300);

}

</textarea>

<button onclick="preview()">Preview</button>

</div>


<div class="box">

<h3>Preview</h3>

<div class="previewBox">

<canvas id="canvas" width="2480" height="3508"></canvas>

</div>

</div>

</div>


<script>

function preview(){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// clear canvas
ctx.clearRect(0,0,canvas.width,canvas.height);

// green background
ctx.fillStyle="#1f8f3a";
ctx.fillRect(0,0,canvas.width,canvas.height);

const code = document.getElementById("codeBox").value;

try{

eval(code);

// run template
template1(ctx, canvas);

}catch(err){

alert("Error in code:\n"+err);

}

}

</script>

</body>
</html>
