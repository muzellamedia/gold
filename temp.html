<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Template Designer</title>

<style>

body{
font-family:Arial;
margin:0;
padding:20px;
background:#f4f4f4;
}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.box{
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding:15px;
flex:1;
min-width:320px;
}

textarea{
width:100%;
height:400px;
font-family:monospace;
font-size:14px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

button{
padding:10px 20px;
background:#b8860b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#a07600;
}

.preview{
border:1px solid #ddd;
height:420px;
border-radius:8px;
overflow:auto;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<h2>Poster Template Designer</h2>

<div class="container">

<div class="box">

<h3>HTML Code</h3>

<textarea id="codeBox">

<div style="text-align:center;padding:50px">

<h1 style="color:gold">Gold Rate Poster</h1>

<h2>1 Gram ₹ 8000</h2>
<h2>1 Pavan ₹ 64000</h2>

<p>Contact: 9645565177</p>

</div>

</textarea>

<button onclick="preview()">Preview</button>

</div>


<div class="box">

<h3>Preview</h3>

<div class="preview">

<iframe id="previewFrame"></iframe>

</div>

</div>

</div>

<script>

function preview(){

const code =
document.getElementById("codeBox").value;

const frame =
document.getElementById("previewFrame");

frame.srcdoc = code;

}

</script>

</body>
</html>
