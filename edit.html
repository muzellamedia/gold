<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Details</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#b8860b,#ffd700);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:90%;
max-width:360px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
@media (max-width:480px){

.box{
padding:20px;
}

h3{
font-size:18px;
}

}
.logo-preview{
  width:120px;
  height:120px;
  border:1px solid #ccc;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
}

.logo-preview{
width:100px;
height:100px;
border-radius:50%;
overflow:hidden;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#b8860b;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
font-size:16px;
}
  #loadingScreen,#savingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader{
width:40px;
height:40px;
border:4px solid #ddd;
border-top:4px solid #b8860b;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

  <div id="loadingScreen">
  <div class="loader"></div>
  <p>Loading...</p>
</div>
  
<div class="box">

<h3>Edit Shop Details</h3>

<div class="logo-preview" id="logoPreview">No Logo</div>
<input type="file" id="logoFile" accept="image/*">

<input type="text" id="num1" placeholder="Phone 1">
<input type="text" id="num2" placeholder="Phone 2">
<input type="text" id="num3" placeholder="Phone 3">

  <input type="text" id="shop" placeholder="Shop Name">
<input type="text" id="place" placeholder="Address">
<input type="email" id="email" placeholder="Email">

<button onclick="saveDetails()">Save</button>
  <button id="homeBtn" onclick="location.href='index.html'" style="display:none;background:#444;">
Back to Home
</button>

</div>
  <div id="savingScreen" style="display:none">
  <div class="loader"></div>
  <p id="saveText">Saving...</p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwRuapKAap3_OVDtrZeWGqkiux8DBaWtOJmsJCkdgIWBxGw0G_UHWCspR6Dxx3nbtY/exec";
const phone = localStorage.getItem("userPhone");

if(!phone){
  alert("Login required");
  location.href="index.html";
}

// LOAD OLD DATA
fetch(API_URL + "?type=user&phone=" + phone)
.then(res=>res.json())
.then(data=>{

document.getElementById("num1").value = data.contact1 || "";
document.getElementById("num2").value = data.contact2 || "";
document.getElementById("num3").value = data.contact3 || "";
  document.getElementById("shop").value = data.shop || "";
document.getElementById("place").value = data.place || "";
document.getElementById("email").value = data.email || "";

if(data.logo){

// Drive file id extract
let fileId = data.logo.includes("id=")
  ? data.logo.split("id=")[1]
  : data.logo.split("/d/")[1].split("/")[0];

// convert to lh3 image link
let imgUrl = "https://lh3.googleusercontent.com/d/" + fileId;

document.getElementById("logoPreview").innerHTML =
"<img src='"+imgUrl+"'>";

}

document.getElementById("loadingScreen").style.display="none";

});
// SAVE
function saveDetails(){

document.getElementById("savingScreen").style.display="flex";

const file = document.getElementById("logoFile").files[0];

const saveToServer = (logoBase64="")=>{

fetch(API_URL,{
method:"POST",
body: JSON.stringify({
type:"updateUser",
phone: phone,
logoBase64: logoBase64,
contact1: num1.value,
contact2: num2.value,
contact3: num3.value,
shop: shop.value,
place: place.value,
email: email.value
})
})
.then(res=>res.json())
.then(data=>{

if(data.status === "locked"){

alert("You can edit again after " + data.hoursLeft + " hours");
document.getElementById("savingScreen").style.display="none";
return;

}

document.getElementById("saveText").innerText="Saved ✔";

setTimeout(()=>{
document.getElementById("savingScreen").style.display="none";
document.getElementById("homeBtn").style.display="block";
},1200);

});

};

if(file){
const reader = new FileReader();
reader.onload = ()=> saveToServer(reader.result);
reader.readAsDataURL(file);
}else{
saveToServer();
}

}
</script>

</body>
</html>
