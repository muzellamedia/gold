<!DOCTYPE html>
<html>
<head>
<title>Edit Details</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#b8860b,#ffd700);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:340px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo-preview{
  width:120px;
  height:120px;
  border:1px solid #ccc;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
}

.logo-preview img{
  max-width:100%;
  max-height:100%;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#b8860b;
  color:white;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="box">

<h3>Edit Shop Details</h3>

<div class="logo-preview" id="logoPreview">No Logo</div>
<input type="file" id="logoFile" accept="image/*">

<input type="text" id="num1" placeholder="Phone 1">
<input type="text" id="num2" placeholder="Phone 2">
<input type="text" id="num3" placeholder="Phone 3">

<button onclick="saveDetails()">Save Permanently</button>

</div>

<script>
const API_URL = "YOUR_SCRIPT_URL_HERE";
const phone = localStorage.getItem("userPhone");

if(!phone){
  alert("Login required");
  location.href="index.html";
}

// LOAD OLD DATA
fetch(API_URL + "?type=user&phone=" + phone)
.then(res=>res.json())
.then(data=>{
  document.getElementById("num1").value = data.contact1 || "";
  document.getElementById("num2").value = data.contact2 || "";
  document.getElementById("num3").value = data.contact3 || "";

  if(data.logo){
    document.getElementById("logoPreview").innerHTML =
      "<img src='"+data.logo+"'>";
  }
});

// SAVE
function saveDetails(){

  const file = document.getElementById("logoFile").files[0];

  const saveToServer = (logoBase64="")=>{
    fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({
        type:"updateUser",
        phone: phone,
        logo: logoBase64,
        contact1: num1.value,
        contact2: num2.value,
        contact3: num3.value
      })
    })
    .then(res=>res.json())
    .then(()=>{
      alert("Saved Permanently");
    });
  };

  if(file){
    const reader = new FileReader();
    reader.onload = ()=> saveToServer(reader.result);
    reader.readAsDataURL(file);
  } else {
    saveToServer();
  }
}
</script>

</body>
</html>
