 
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#b8860b,#ffd700);
  margin:0;
  padding:15px;
  display:flex;
  justify-content:center;
}

.card{
  background:white;
  width:100%;
  max-width:400px;
  border-radius:15px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

.logo{
  width:110px;
  height:110px;
  margin:auto;
  border-radius:50%;
  border:2px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h2{
  margin:10px 0 5px;
}

.info{
  font-size:14px;
  color:#444;
  margin:3px 0;
  word-break:break-word;
}

.status{
  margin-top:15px;
  font-weight:bold;
  font-size:15px;
}

.updated{
  color:green;
}

.not-updated{
  color:red;
}

button{
  width:100%;
  padding:12px;
  background:#b8860b;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
  font-size:15px;
}

button:hover{
  background:#a07600;
}

.plan-active{
  color:green;
}

.plan-warning{
  color:orange;
}

.plan-expired{
  color:red;
}

/* Download Loading Animation */

.loading-btn{
  position:relative;
  pointer-events:none;
  opacity:0.8;
}

.loading-btn::after{
  content:"";
  width:18px;
  height:18px;
  border:3px solid white;
  border-top:3px solid transparent;
  border-radius:50%;
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  0%{transform:translateY(-50%) rotate(0deg);}
  100%{transform:translateY(-50%) rotate(360deg);}
}

/* Full Screen Loader */

#loadingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #b8860b;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

/* Mobile improvements */

@media (max-width:480px){

.card{
  padding:18px;
}
body{
min-height:100vh;
align-items:center;
}
.logo{
  width:95px;
  height:95px;
}

h2{
  font-size:20px;
}

.info{
  font-size:13px;
}

button{
  font-size:14px;
}

}

</style>
</head>

<body>

<div id="loadingScreen">
<div class="loader"></div>
<p>Loading...</p>
</div>

<div class="card">

<div class="logo" id="logoBox">
No Logo
</div>

<h2 id="shopName">Shop Name</h2>

<div class="info" id="place"></div>
<div class="info" id="district"></div>
<div class="info" id="email"></div>
<div class="info" id="contact"></div>

<div class="status" id="rateStatus">
Checking rate status...
</div>

  <div class="status" id="planStatus">
Checking subscription...
</div>

  <button id="downloadBtn" disabled onclick="generatePoster()">
Download Poster
</button>
  
  <button onclick="location.href='edit.html'">Edit Details</button>
  <button id="rechargeBtn" onclick="location.href='recharge.html'" style="display:none;background:#444;">
  Recharge Now
</button>

  </div>

  <script>

  // =====================
  // GLOBAL VARIABLES
  // =====================
  let shopName = "";
  let logoUrl = "";
  let contacts = [];
  let backgrounds = [];

  let gold1Gram = "";
let gold1Pavan = "";
  let rateDate = "";

const API_URL = "https://script.google.com/macros/s/AKfycbwjSLCG5yRNkA2Ti4HjmZOoL3QsRUpUjp-RRjn__tl7cKbYmSPTUFtssSg4zrbbO72klA/exec";
const userPhone = localStorage.getItem("userPhone");
  

// 🔐 Login Protection (Run Immediately)
if(!userPhone){
  window.location.replace("index.html");
}

// =====================
// =====================
// PAGE LOAD
// =====================
window.addEventListener("DOMContentLoaded", async function(){

const phone = userPhone;

const res = await fetch(API_URL + "?type=init&phone=" + phone);
const data = await res.json();

const user = data.user || {};
const rates = data.rates || {};
backgrounds = data.backgrounds || [];


// =====================
// =====================
// USER DATA
// =====================

shopName = user.shop || "";
logoUrl = user.logo || "";

contacts = [
user.contact1,
user.contact2,
user.contact3
].filter(n=>n);

document.getElementById("shopName").innerText = user.shop || "";
document.getElementById("place").innerText = user.place || "";
document.getElementById("district").innerText = user.district || "";
document.getElementById("email").innerText = user.email || "";

document.getElementById("contact").innerText =
contacts.join(" | ");

// LOGO LOAD (lh3 format)
if(user.logo){

let fileId = "";

if(user.logo.includes("id=")){
fileId = user.logo.split("id=")[1];
}
else if(user.logo.includes("/d/")){
fileId = user.logo.split("/d/")[1].split("/")[0];
}

let imgUrl = "https://lh3.googleusercontent.com/d/" + fileId;

// UI display
document.getElementById("logoBox").innerHTML =
"<img src='"+imgUrl+"'>";

// ⭐ poster-ന് same URL ഉപയോഗിക്കുക
logoUrl = imgUrl;

}



gold1Gram = rates.gold1gram || "";
gold1Pavan = gold1Gram * 8;
rateDate = rates.date || "";

const today = new Date().toISOString().slice(0,10);

if(rateDate === today){

rateStatus.innerHTML = "Today Gold Rate Updated";
rateStatus.className = "status updated";

}else{

rateStatus.innerHTML = "Today Gold Rate Not Updated";
rateStatus.className = "status not-updated";

}
// =====================
// =====================
// PLAN STATUS
// =====================

const expiry = user.planExpiry ? new Date(user.planExpiry) : null;
const todayDate = new Date();

const downloadBtn = document.getElementById("downloadBtn");
const planStatus = document.getElementById("planStatus");
const rechargeBtn = document.getElementById("rechargeBtn");

if(!expiry || todayDate > expiry){

// PLAN EXPIRED

downloadBtn.disabled = true;
downloadBtn.innerText = "Recharge Required";
downloadBtn.style.background = "red";

rechargeBtn.style.display = "block";

planStatus.innerText = "Plan Expired";
planStatus.className = "status plan-expired";

}else{

// PLAN ACTIVE

downloadBtn.disabled = false;
downloadBtn.innerText = "Download Poster";
downloadBtn.style.background = "#b8860b";

const diffTime = expiry - todayDate;
const remainingDays = Math.ceil(diffTime / (1000*60*60*24));

planStatus.innerText =
"Plan Active - " + remainingDays + " Days Remaining";

planStatus.className = "status plan-active";

rechargeBtn.style.display = "none";

// SHOW WARNING IF LESS THAN 3 DAYS
if(remainingDays <= 3){
planStatus.className = "status plan-warning";
rechargeBtn.style.display = "block";
}

}

// REMOVE LOADING SCREEN
document.getElementById("loadingScreen").style.display = "none";
 });
  // =====================
  // RANDOM
  // =====================
  function getSeed(){
    const today = new Date().toISOString().slice(0,10);
    let seed = 0;
    for(let i=0;i<today.length;i++){
      seed += today.charCodeAt(i);
    }
    return seed;
  }

  function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }


  // =====================
  // DOWNLOAD
  // =====================
  function generatePoster(){

const btn = document.getElementById("downloadBtn");

btn.classList.add("loading-btn");
btn.innerText = "Generating...";

// background load ആയിട്ടില്ലെങ്കിൽ wait ചെയ്യുക
if(backgrounds.length === 0){

setTimeout(function(){
generatePoster();
},500);

return;

}

const seed = getSeed();
const bgIndex = Math.floor(seededRandom(seed) * backgrounds.length);

createPoster(backgrounds[bgIndex]);

}


  // =====================
  // CREATE POSTER
  // =====================
  function createPoster(bgUrl){

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 2480;
  canvas.height = 3508;

  const bg = new Image();
  bg.crossOrigin = "anonymous";   // MUST
  bg.src = bgUrl;

  bg.onload = function(){

    ctx.drawImage(bg,0,0,2480,3508);

    const templateList = [template1, template2, template3];
    const seed = getSeed();
    const index = Math.floor(seededRandom(seed+10) * templateList.length);

    templateList[index](ctx, canvas);

  };

  bg.onerror = function(){
    alert("Background failed to load");
  };
}
function drawRatesLeft(ctx){

  ctx.textAlign="left";

  ctx.font="bold 180px Arial";
  ctx.fillText("GOLD 1 GRAM",1100,1700);
  ctx.fillText("₹ " + gold1Gram,1100,1950);

  ctx.font="bold 180px Arial";
  ctx.fillText("GOLD 1 PAVAN",1100,2300);
  ctx.fillText("₹ " + gold1Pavan,1100,2550);
}
  // =====================
  // TEMPLATE 1
  // =====================
  function template1(ctx, canvas){

    ctx.fillStyle="white";
    ctx.textAlign="center";

    ctx.font="bold 160px Arial";
    ctx.fillText(shopName,1240,250);

    if(logoUrl){
      const logo = new Image();
      logo.crossOrigin="anonymous";
      logo.src = logoUrl + "&t=" + new Date().getTime();

      logo.onload = function(){
  ctx.drawImage(logo,840,350,800,800);
  drawRates(ctx);
  drawContacts(ctx);
  save(canvas);
};
    } else {
  drawRates(ctx);
  drawContacts(ctx);
  save(canvas);
}
  }


  // =====================
  // TEMPLATE 2
  // =====================
  function template2(ctx, canvas){

    ctx.fillStyle="white";
    ctx.textAlign="left";

    if(logoUrl){
      const logo = new Image();
      logo.crossOrigin="anonymous";
      logo.src = logoUrl;

      logo.onload = function(){
  ctx.drawImage(logo,200,300,700,700);
  drawRatesLeft(ctx);
  drawContacts(ctx);
  save(canvas);
};

    } else {
  drawRatesLeft(ctx);
  drawContacts(ctx);
  save(canvas);
}
  }


  // =====================
  // TEMPLATE 3
  // =====================
  function template3(ctx, canvas){

  ctx.fillStyle="white";
  ctx.textAlign="center";

  ctx.font="bold 200px Arial";
  ctx.fillText("1 GRAM ₹ " + gold1Gram,1240,1700);

  ctx.font="bold 200px Arial";
  ctx.fillText("1 PAVAN ₹ " + gold1Pavan,1240,2000);

  drawContacts(ctx);
  save(canvas);
}


  // RATES
  function drawRates(ctx){

  ctx.font="bold 180px Arial";
  ctx.fillText("GOLD 1 GRAM",1240,1700);
  ctx.fillText("₹ " + gold1Gram,1240,1950);

  ctx.font="bold 180px Arial";
  ctx.fillText("GOLD 1 PAVAN",1240,2300);
  ctx.fillText("₹ " + gold1Pavan,1240,2550);
}


  // =====================
  // CONTACTS
  // =====================
  function drawContacts(ctx){

    ctx.textAlign="center";

    ctx.font="bold 110px Arial";
    ctx.fillText("For more details:",1240,3200);

    ctx.font="bold 100px Arial";
    ctx.fillText(contacts.join("  |  "),1240,3350);

    ctx.font="bold 80px Arial";
    ctx.fillText("Rate Date: " + rateDate,1240,3500);
  }


  // =====================
 // =====================
// SAVE
// =====================
function save(canvas){

const btn = document.getElementById("downloadBtn");

try{
const link = document.createElement("a");
link.download = "A4_Gold_Rate_Poster.png";
link.href = canvas.toDataURL("image/png");
link.click();

}catch(err){
alert("Image export blocked due to CORS");
console.error(err);
}

btn.classList.remove("loading-btn");
btn.innerText = "Download Poster";

}
   </script>
</body>
</html>
