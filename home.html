 
  <style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#b8860b,#ffd700);
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.card{
  background:white;
  width:400px;
  border-radius:15px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

.logo{
  width:130px;
  height:130px;
  margin:auto;
  border-radius:50%;
  border:2px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h2{
  margin:10px 0 5px;
}

.info{
  font-size:14px;
  color:#444;
  margin:3px 0;
}

.status{
  margin-top:15px;
  font-weight:bold;
  font-size:16px;
}

.updated{
  color:green;
}

.not-updated{
  color:red;
}

button{
  width:100%;
  padding:12px;
  background:#b8860b;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:20px;
}

button:hover{
  background:#a07600;
}
.plan-active{
  color:green;
}

.plan-warning{
  color:orange;
}

.plan-expired{
  color:red;
}
</style>
</head>

<body>

<div class="card">

<div class="logo" id="logoBox">
No Logo
</div>

<h2 id="shopName">Shop Name</h2>

<div class="info" id="place"></div>
<div class="info" id="district"></div>
<div class="info" id="email"></div>
<div class="info" id="contact"></div>

<div class="status" id="rateStatus">
Checking rate status...
</div>

  <div class="status" id="planStatus">
Checking subscription...
</div>

  <button onclick="generatePoster()">Download Poster</button>
  
  <button onclick="location.href='edit.html'">Edit Details</button>
  <button id="rechargeBtn" onclick="location.href='recharge.html'" style="display:none;background:#444;">
  Recharge Now
</button>

  </div>

  <script>

  // =====================
  // GLOBAL VARIABLES
  // =====================
  let shopName = "";
  let logoUrl = "";
  let contacts = [];
  let backgrounds = [];

  let gold1Gram = "";
let gold1Pavan = "";
  let rateDate = "";

const API_URL = "https://script.google.com/macros/s/AKfycbxEnbnZSqh8sZlqF2GvMRuCf07IRcxKnwrfehjeBsRvJeNfdilEcJizIIggffo0jS074Q/exec";
const userPhone = localStorage.getItem("userPhone");

// 🔐 Login Protection (Run Immediately)
if(!userPhone){
  window.location.replace("index.html");
}

// =====================
// PAGE LOAD
// =====================
window.addEventListener("DOMContentLoaded", function(){

  const phone = userPhone;

  // USER DATA
  fetch(API_URL + "?type=user&phone=" + phone)
  .then(res=>res.json())
  .then(data=>{

    shopName = data.shop || "";
    logoUrl = data.logo || "";

    contacts = [
      data.contact1,
      data.contact2,
      data.contact3
    ].filter(n=>n);

    document.getElementById("shopName").innerText = data.shop || "";
    document.getElementById("place").innerText = data.place || "";
    document.getElementById("district").innerText = data.district || "";
    document.getElementById("email").innerText = data.email || "";
    document.getElementById("contact").innerText = data.contact1 || "";

    if(data.logo){
      document.getElementById("logoBox").innerHTML =
        "<img src='"+data.logo+"'>";
    }
const expiry = data.planExpiry ? new Date(data.planExpiry) : null;
const today = new Date();

const downloadBtn = document.getElementById("downloadBtn");
const planStatus = document.getElementById("planStatus");

if(!expiry || today > expiry){

  downloadBtn.disabled = true;
  downloadBtn.innerText = "Recharge Required";
  downloadBtn.style.background = "red";

  planStatus.innerText = "Plan Expired";
  planStatus.className = "status plan-expired";

}else{

  // 🟢 Active
  rechargeBtn.style.display = "none";

  const diffTime = expiry - today;
  const remainingDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

  planStatus.innerText =
    "Plan Active - " + remainingDays + " Days Remaining";

  if(remainingDays <= 3){
    planStatus.className = "status plan-warning";
  }else{
    planStatus.className = "status plan-active";
  }

}
  // RATE STATUS
  fetch(API_URL + "?type=rates")
  .then(res=>res.json())
  .then(data=>{

    gold1Gram = data.gold1gram || "";
    gold1Pavan = gold1Gram * 8;
    rateDate = data.date || "";

    const today = new Date().toISOString().slice(0,10);

    if(rateDate === today){
      rateStatus.innerHTML = "Today Gold Rate Updated";
      rateStatus.className = "status updated";
    }else{
      rateStatus.innerHTML = "Today Gold Rate Not Updated";
      rateStatus.className = "status not-updated";
    }

  });

});

    // BACKGROUNDS
    fetch(API_URL + "?type=backgrounds")
    .then(res => res.json())
    .then(data => {
      backgrounds = data || [];
    });

  };

    

  // =====================
  // RANDOM
  // =====================
  function getSeed(){
    const today = new Date().toISOString().slice(0,10);
    let seed = 0;
    for(let i=0;i<today.length;i++){
      seed += today.charCodeAt(i);
    }
    return seed;
  }

  function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }


  // =====================
  // DOWNLOAD
  // =====================
  function generatePoster(){

    if(backgrounds.length === 0){
      alert("Backgrounds not loaded yet");
      return;
    }

    const seed = getSeed();
    const bgIndex = Math.floor(seededRandom(seed) * backgrounds.length);

    createPoster(backgrounds[bgIndex]);
  }


  // =====================
  // CREATE POSTER
  // =====================
  function createPoster(bgUrl){

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 2480;
  canvas.height = 3508;

  const bg = new Image();
  bg.crossOrigin = "anonymous";   // MUST
  bg.src = bgUrl;

  bg.onload = function(){

    ctx.drawImage(bg,0,0,2480,3508);

    const templateList = [template1, template2, template3];
    const seed = getSeed();
    const index = Math.floor(seededRandom(seed+10) * templateList.length);

    templateList[index](ctx, canvas);

  };

  bg.onerror = function(){
    alert("Background failed to load");
  };
}

  // =====================
  // TEMPLATE 1
  // =====================
  function template1(ctx, canvas){

    ctx.fillStyle="white";
    ctx.textAlign="center";

    ctx.font="bold 160px Arial";
    ctx.fillText(shopName,1240,250);

    if(logoUrl){
      const logo = new Image();
      logo.crossOrigin="anonymous";
      logo.src = logoUrl + "&t=" + new Date().getTime();

      logo.onload = function(){
  ctx.drawImage(logo,840,350,800,800);
  drawRates(ctx);
  drawContacts(ctx);
  save(canvas);
};
    } else {
  drawRates(ctx);
  drawContacts(ctx);
  save(canvas);
}
  }


  // =====================
  // TEMPLATE 2
  // =====================
  function template2(ctx, canvas){

    ctx.fillStyle="white";
    ctx.textAlign="left";

    if(logoUrl){
      const logo = new Image();
      logo.crossOrigin="anonymous";
      logo.src = logoUrl;

      logo.onload = function(){
  ctx.drawImage(logo,200,300,700,700);
  drawRatesLeft(ctx);
  drawContacts(ctx);
  save(canvas);
};

    } else {
  drawRatesLeft(ctx);
  drawContacts(ctx);
  save(canvas);
}
  }


  // =====================
  // TEMPLATE 3
  // =====================
  function template3(ctx, canvas){

  ctx.fillStyle="white";
  ctx.textAlign="center";

  ctx.font="bold 200px Arial";
  ctx.fillText("1 GRAM ₹ " + gold1Gram,1240,1700);

  ctx.font="bold 200px Arial";
  ctx.fillText("1 PAVAN ₹ " + gold1Pavan,1240,2000);

  drawContacts(ctx);
  save(canvas);
}


  // RATES
  function drawRates(ctx){

  ctx.font="bold 180px Arial";
  ctx.fillText("GOLD 1 GRAM",1240,1700);
  ctx.fillText("₹ " + gold1Gram,1240,1950);

  ctx.font="bold 180px Arial";
  ctx.fillText("GOLD 1 PAVAN",1240,2300);
  ctx.fillText("₹ " + gold1Pavan,1240,2550);
}


  // =====================
  // CONTACTS
  // =====================
  function drawContacts(ctx){

    ctx.textAlign="center";

    ctx.font="bold 110px Arial";
    ctx.fillText("For more details:",1240,3200);

    ctx.font="bold 100px Arial";
    ctx.fillText(contacts.join("  |  "),1240,3350);

    ctx.font="bold 80px Arial";
    ctx.fillText("Rate Date: " + rateDate,1240,3500);
  }


  // =====================
  // SAVE
  // =====================
  function save(canvas){
  try{
    const link = document.createElement("a");
    link.download = "A4_Gold_Rate_Poster.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  } catch(err){
    alert("Image export blocked due to CORS");
    console.error(err);
  }
}
  </script>


  </body>
  </html>
