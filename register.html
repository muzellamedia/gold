<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#8b0000,#ffcccb);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:10px;
}

.register-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:100%;
  max-width:380px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  background:#8b0000;
  color:white;
  font-size:16px;
}

button:hover{
  background:#600000;
}

.message{
  margin-top:12px;
  text-align:center;
  font-weight:bold;
}

/* Mobile extra optimization */

@media(max-width:480px){

.register-box{
  padding:20px;
  border-radius:10px;
}

h2{
  font-size:20px;
}

input{
  padding:14px;
}

button{
  padding:15px;
}

}

</style>
</head>

<body>

<button id="registerBtn" onclick="register()">Register</button>

<input type="tel" id="phone" placeholder="Your Phone Number" required>
<input type="text" id="shop" placeholder="Shop Name" required>
<input type="text" id="place" placeholder="Place" required>
<input type="text" id="district" placeholder="District" required>
<input type="email" id="email" placeholder="Email" required>
<input type="tel" id="contact" placeholder="Contact Number" required>

  <h3 style="margin-top:15px;text-align:center;">Poster Details</h3>

<div style="text-align:center;margin-bottom:10px;">
<input type="file" id="logo" accept="image/*" required>
</div>

<input type="tel" id="contact1" placeholder="Contact 1 (Optional)">
<input type="tel" id="contact2" placeholder="Contact 2 (Optional)">
<input type="tel" id="contact3" placeholder="Contact 3 (Optional)">

<button onclick="register()">Register</button>

<div class="message" id="message"></div>

</div>

<script>

function register(){

  const btn = document.getElementById("registerBtn");
btn.innerText = "Registering...";
btn.disabled = true;

showMessage("Registering...", "orange");

  const phone = document.getElementById("phone").value.trim();
  const shop = document.getElementById("shop").value.trim();
  const place = document.getElementById("place").value.trim();
  const district = document.getElementById("district").value.trim();
  const email = document.getElementById("email").value.trim();
  const contact = document.getElementById("contact").value.trim();
  const logoFile = document.getElementById("logo").files[0];

  const contact1 = document.getElementById("contact1").value.trim();
  const contact2 = document.getElementById("contact2").value.trim();
  const contact3 = document.getElementById("contact3").value.trim();

  if(!phone || !shop || !place || !district || !email || !contact || !logoFile){
    showMessage("All fields are required!", "red");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(){

    fetch("https://script.google.com/macros/s/AKfycbxseHP6OEck_UjQiTn1CragD3cmhpyW-7I4u6aN_BbnKV90lDvj4rD8trWRqgzdxIVDxw/exec", {
      method: "POST",
      body: JSON.stringify({
  type:"register",
  phone,
  shop,
  place,
  district,
  email,
  contact,
  contact1,
  contact2,
  contact3,
  logoBase64: reader.result
})
    })
    .then(res => res.json())
    .then(data => {

      if(data.status === "success"){

        localStorage.setItem("userPhone", phone);

        document.getElementById("message").innerHTML =
        `
        <div style="color:green;">
          <p><b>Successfully Registered!</b></p>
          <p>Your Security Code is: <b>${data.code}</b></p>
          <button onclick="goHome()" style="margin-top:10px;background:#006400;">
            GO TO HOME
          </button>
        </div>
        `;

      else{
showMessage("Registration failed!", "red");

btn.innerText = "Register";
btn.disabled = false;
}

    });

  };

  reader.readAsDataURL(logoFile);

}

// ✅ OUTSIDE FUNCTION

function goHome(){
  window.location.href = "home.html";
}

function showMessage(text, color){
  const msg = document.getElementById("message");
  msg.innerText = text;
  msg.style.color = color;
}

</script>

</body>
</html>
